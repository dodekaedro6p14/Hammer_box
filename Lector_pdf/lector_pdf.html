<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="visor-pdf.css">
</head>
<body>
  <!-- Loading bar -->
  <div id="loading-bar"></div>

  <!-- Toolbar -->
  <div id="toolbar">
    <span class="tb-title">PDF</span>

    <!-- Sidebar toggle -->
    <button class="tb-btn" id="btn-sidebar" title="Miniaturas (M)">
      <svg viewBox="0 0 24 24"><path d="M3 5h2v2H3zm4 0h14v2H7zm-4 6h2v2H3zm4 0h14v2H7zm-4 6h2v2H3zm4 0h14v2H7z"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Page controls -->
    <div id="page-controls">
      <button class="tb-btn" id="btn-prev" title="Página anterior (←)">
        <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
      </button>
      <input type="number" id="page-input" min="1" value="1" title="Número de página" />
      <span id="page-total">/ —</span>
      <button class="tb-btn" id="btn-next" title="Página siguiente (→)">
        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Zoom -->
    <button class="tb-btn" id="btn-zoom-out" title="Alejar (↓ / scroll)">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM7 9h5v1H7z"/></svg>
    </button>
    <span class="zoom-badge" id="zoom-label">100%</span>
    <button class="tb-btn" id="btn-zoom-in" title="Acercar (↑ / scroll)">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14zM10 7H9v2H7v1h2v2h1v-2h2V9h-2z"/></svg>
    </button>
    <button class="tb-btn" id="btn-zoom-reset" title="Zoom 100%">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Fit width -->
    <button class="tb-btn" id="btn-fit" title="Ajustar a ventana">
      <svg viewBox="0 0 24 24"><path d="M3 3h7v2H5v5H3V3zm11 0h7v7h-2V5h-5V3zm7 11v7h-7v-2h5v-5h2zm-9 5H7v-5H5v7h7v-2zm1-6v4l1.5-1.5L16 17v-4h-3z"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Theme toggle -->
    <button class="tb-btn" id="btn-theme" title="Cambiar tema (T)">
      <svg id="theme-icon-dark" viewBox="0 0 24 24"><path d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6a9.72 9.72 0 0 1 .748-3.752 9.75 9.75 0 1 0 12.754 12.754z"/></svg>
      <svg id="theme-icon-light" viewBox="0 0 24 24" style="display:none"><path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75zM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59zm-12.728 12.728a.75.75 0 0 0 1.061-1.06l-1.59-1.591a.75.75 0 0 0-1.06 1.06l1.589 1.591zM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75zM3 12a.75.75 0 0 1 .75-.75H6a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 12zm14.15 7.94a.75.75 0 0 0 1.061-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591zm-9.88-1.06a.75.75 0 0 0 1.06-1.06l-1.59-1.59a.75.75 0 0 0-1.06 1.06l1.59 1.59zM12 20.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V21a.75.75 0 0 1 .75-.75z"/></svg>
    </button>

    <div class="tb-spacer"></div>

    <!-- File name -->
    <span id="file-name-badge"></span>

    <!-- Open file -->
    <button class="tb-btn" id="btn-open" title="Abrir archivo PDF">
      <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
    </button>
    <input type="file" id="file-input" accept=".pdf" />
  </div>

  <!-- Sidebar thumbnails -->
  <div id="sidebar"></div>

  <!-- Main viewer -->
  <div id="viewer-area">

    <!-- Drop zone -->
    <div id="drop-zone">
      <div class="drop-box" id="drop-box">
        <div class="drop-icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="4" width="40" height="52" rx="3" fill="currentColor" opacity="0.12"/>
            <rect x="8" y="4" width="40" height="52" rx="3" stroke="currentColor" stroke-width="2"/>
            <path d="M28 4v12h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="16" y1="28" x2="40" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="35" x2="36" y2="35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="16" y1="42" x2="30" y2="42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="50" cy="50" r="10" fill="currentColor" opacity="0.1" stroke="currentColor" stroke-width="2"/>
            <line x1="50" y1="45" x2="50" y2="55" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="45" y1="50" x2="55" y2="50" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="drop-title">Abrir un documento PDF</p>
        <p class="drop-sub">Arrastra tu archivo aquí<br>o haz clic para buscarlo</p>
        <button class="drop-btn">Elegir archivo</button>
      </div>
    </div>

    <!-- Pages scroll area -->
    <div id="scroll-container"></div>

  </div>

  <!-- Hint bar -->
  <div id="hint-bar">
    <span class="hint-item"><span class="hint-key">q e</span> Zoom</span>
    <span class="hint-item"><span class="hint-key">s w</span> Página</span>
    <span class="hint-item"><span class="hint-key">Scroll</span> Zoom / Desplazar</span>
    <span class="hint-item"><span class="hint-key">T</span> Tema</span>
    <span class="hint-item"><span class="hint-key">M</span> Miniaturas</span>
    <span class="hint-item"><span class="hint-key">F</span> Ajustar ventana</span>
  </div>

<script src="visor-pdf.js"></script>
</body>
</html>
